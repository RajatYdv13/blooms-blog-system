services:
  - type: web
    name: blooms-backend
    env: docker
    plan: free
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 8080

  - type: web
    name: blooms-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_HOST
        fromService:
          type: web
          name: blooms-backend
          property: host
      - key: NODE_VERSION
        value: 20.11.0
